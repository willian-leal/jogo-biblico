<div class="rules-wrapper">
  <p class="subtitle">Como funciona</p>
  <h1>{{ title }}</h1>
  <div class="ornament" aria-hidden="true"><span></span><strong>*</strong><span></span></div>

  <ul class="rules-list">
    @for (rule of rules; track rule.text) {
      <li>
        <span class="rule-icon">{{ rule.icon }}</span>
        <span class="rule-text">{{ rule.text }}</span>
      </li>
    }
  </ul>

  <button class="btn-ready" (click)="ready.emit()">Entendido</button>
</div>
